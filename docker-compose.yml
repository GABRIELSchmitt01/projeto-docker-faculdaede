version: '3.8'

services:
  # 1º Container: Banco de Dados (MySQL)
  db:
    image: mysql:8.0
    container_name: satisfacao_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sistema_curso
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2º Container: SGBD (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: satisfacao_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

  # 3º Container: Front-end + Back-end (PHP)
  app:
    build: . 
    container_name: satisfacao_app
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

volumes:
  db_data: